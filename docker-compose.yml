version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: choonwise
      POSTGRES_USER: choonwise
      POSTGRES_PASSWORD: choonwise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://choonwise:choonwise@postgres:5432/choonwise"
      JWT_SECRET: "development-secret-key"
      NODE_ENV: development
      FRONTEND_URL: "http://localhost:3000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: "http://localhost:5000/api"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

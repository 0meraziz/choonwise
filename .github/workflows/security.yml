name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'

jobs:
  security-audit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        workspace: [backend, frontend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

    - name: Install dependencies
      working-directory: ${{ matrix.workspace }}
      run: npm ci

    - name: Run security audit
      working-directory: ${{ matrix.workspace }}
      run: |
        # Run audit and capture output
        npm audit --audit-level high --json > audit-results.json || true

        # Check if there are high/critical vulnerabilities
        VULNERABILITIES=$(cat audit-results.json | jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical')

        if [ "$VULNERABILITIES" -gt 0 ]; then
          echo "❌ Found $VULNERABILITIES high/critical vulnerabilities in ${{ matrix.workspace }}"
          npm audit --audit-level high
          exit 1
        else
          echo "✅ No high/critical vulnerabilities found in ${{ matrix.workspace }}"
        fi

    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audit-results-${{ matrix.workspace }}
        path: ${{ matrix.workspace }}/audit-results.json
        retention-days: 30

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high
        allow-dependencies-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
